events {}

http {
    upstream account_backend {
        server account-service:8080;
    }

    upstream transfer_backend {
        server transfer-service:8080;
    }

    server {
        listen 80;

        # Health checks (used by the gateway)
        location /actuator/health {
            proxy_pass http://account_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host account-service:8080;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Accounts + customers (customer-service / account-service responsibilities)
        location ^~ /api/v1/customers {
            proxy_pass http://account_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host account-service:8080;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/v1/accounts {
            proxy_pass http://account_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host account-service:8080;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Internal seed/fund (testing only)
        location ^~ /internal/ {
            proxy_pass http://account_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host account-service:8080;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Transfers (saga orchestrator)
        location ^~ /api/v1/transfers {
            proxy_pass http://transfer_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host transfer-service:8080;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}