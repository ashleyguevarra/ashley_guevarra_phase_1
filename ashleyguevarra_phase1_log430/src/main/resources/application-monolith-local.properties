# For local run with: docker compose -f docker-compose.monolith.yml up -d db redis
# Monolith DB on host port 5434, Redis on 6380
# Use monolith-only migrations (avoids conflict with account/transfer V1)
spring.datasource.url=jdbc:postgresql://localhost:5434/canbankx
spring.data.redis.host=localhost
spring.data.redis.port=6380
spring.flyway.locations=classpath:db/migration/monolith
server.port=8080
