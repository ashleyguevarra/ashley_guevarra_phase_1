services:
  app1:
    build: .
    container_name: brokerx_app1
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/brokerx
      SPRING_DATASOURCE_USERNAME: brokerx
      SPRING_DATASOURCE_PASSWORD: brokerx
      SERVER_PORT: 8080
    depends_on:
      db:
        condition: service_healthy

  app2:
    build: .
    container_name: brokerx_app2
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/brokerx
      SPRING_DATASOURCE_USERNAME: brokerx
      SPRING_DATASOURCE_PASSWORD: brokerx
      SERVER_PORT: 8080
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: brokerx_db_lb
    environment:
      POSTGRES_DB: brokerx
      POSTGRES_USER: brokerx
      POSTGRES_PASSWORD: brokerx
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brokerx -d brokerx"]
      interval: 5s
      timeout: 3s
      retries: 20

  nginx:
    image: nginx:latest
    container_name: brokerx_nginx
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2

  gateway:
    image: devopsfaith/krakend:2.7
    container_name: brokerx_gateway
    depends_on:
      - nginx
    ports:
      - "8090:8080"
    volumes:
      - ./krakend/krakend.json:/etc/krakend/krakend.json:ro
    command: ["run", "-c", "/etc/krakend/krakend.json"]